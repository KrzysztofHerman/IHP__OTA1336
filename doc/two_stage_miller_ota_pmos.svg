<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .bg { fill: #fbfbf8; }
      .wire { stroke: #1f2937; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke-width: 2; }
      .blk { fill: #ffffff; stroke: #1f2937; stroke-width: 3; }
      .pmos { fill: #e8f2ff; stroke: #1f2937; stroke-width: 3; }
      .nmos { fill: #eef8ea; stroke: #1f2937; stroke-width: 3; }
      .bias { fill: #fff3d9; stroke: #1f2937; stroke-width: 3; }
      .cap { fill: #f7ecff; stroke: #1f2937; stroke-width: 3; }
      .title { font: 700 30px "DejaVu Sans", sans-serif; fill: #111827; }
      .lbl { font: 600 20px "DejaVu Sans", sans-serif; fill: #111827; }
      .txt { font: 500 18px "DejaVu Sans", sans-serif; fill: #111827; }
      .small { font: 500 16px "DejaVu Sans", sans-serif; fill: #374151; }
    </style>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1f2937" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760" />

  <text class="title" x="42" y="56">Two-Stage Miller OTA (PMOS Differential Pair)</text>

  <line class="wire" x1="70" y1="110" x2="1130" y2="110" />
  <text class="lbl" x="75" y="98">VDD</text>

  <circle cx="130" cy="640" r="5" fill="#1f2937" />
  <line class="wire" x1="130" y1="640" x2="130" y2="690" />
  <line class="wire thin" x1="100" y1="690" x2="160" y2="690" />
  <line class="wire thin" x1="108" y1="702" x2="152" y2="702" />
  <line class="wire thin" x1="116" y1="714" x2="144" y2="714" />
  <text class="lbl" x="76" y="734">VSS / GND</text>

  <line class="wire" x1="270" y1="110" x2="270" y2="170" />
  <rect class="pmos" x="220" y="170" width="100" height="130" rx="10" />
  <text class="lbl" x="248" y="208">M1</text>
  <text class="small" x="232" y="228">PMOS</text>
  <line class="wire" x1="220" y1="235" x2="170" y2="235" />
  <circle cx="170" cy="235" r="4" fill="#1f2937" />
  <text class="txt" x="105" y="241">VIN+</text>

  <line class="wire" x1="470" y1="110" x2="470" y2="170" />
  <rect class="pmos" x="420" y="170" width="100" height="130" rx="10" />
  <text class="lbl" x="448" y="208">M2</text>
  <text class="small" x="432" y="228">PMOS</text>
  <line class="wire" x1="520" y1="235" x2="570" y2="235" />
  <circle cx="570" cy="235" r="4" fill="#1f2937" />
  <text class="txt" x="575" y="241">VIN-</text>

  <line class="wire" x1="270" y1="300" x2="270" y2="350" />
  <line class="wire" x1="470" y1="300" x2="470" y2="350" />
  <line class="wire" x1="270" y1="350" x2="470" y2="350" />
  <circle cx="370" cy="350" r="5" fill="#1f2937" />
  <text class="small" x="285" y="336">PMOS differential pair</text>

  <rect class="bias" x="330" y="395" width="80" height="120" rx="10" />
  <text class="lbl" x="347" y="435">IB</text>
  <path class="wire thin" d="M370 454 L370 488" marker-end="url(#arrow)" />
  <text class="small" x="296" y="531">Bias current source</text>
  <line class="wire" x1="370" y1="350" x2="370" y2="395" />
  <line class="wire" x1="370" y1="515" x2="370" y2="640" />
  <line class="wire" x1="370" y1="640" x2="130" y2="640" />

  <rect class="nmos" x="610" y="305" width="105" height="140" rx="10" />
  <text class="lbl" x="644" y="345">M3</text>
  <text class="small" x="626" y="366">NMOS</text>
  <line class="wire" x1="470" y1="350" x2="610" y2="350" />
  <line class="wire" x1="662" y1="445" x2="662" y2="640" />
  <line class="wire" x1="662" y1="640" x2="370" y2="640" />

  <line class="wire" x1="662" y1="305" x2="662" y2="245" />
  <circle cx="662" cy="245" r="5" fill="#1f2937" />
  <text class="lbl" x="620" y="228">V1</text>
  <text class="small" x="585" y="468">First stage gain node</text>

  <rect class="nmos" x="860" y="305" width="105" height="140" rx="10" />
  <text class="lbl" x="894" y="345">M4</text>
  <text class="small" x="876" y="366">NMOS</text>
  <line class="wire" x1="913" y1="445" x2="913" y2="640" />
  <line class="wire" x1="913" y1="640" x2="662" y2="640" />
  <line class="wire" x1="913" y1="305" x2="913" y2="240" />
  <line class="wire" x1="913" y1="240" x2="1080" y2="240" />
  <circle cx="1080" cy="240" r="5" fill="#1f2937" />
  <text class="lbl" x="1088" y="246">VOUT</text>

  <line class="wire" x1="662" y1="245" x2="860" y2="245" />
  <line class="wire" x1="860" y1="245" x2="860" y2="350" />
  <text class="small" x="810" y="285">Second stage input</text>

  <line class="wire" x1="913" y1="110" x2="913" y2="180" />
  <rect class="blk" x="876" y="180" width="74" height="52" rx="8" />
  <text class="small" x="888" y="211">Iload</text>
  <line class="wire" x1="913" y1="232" x2="913" y2="240" />

  <rect class="cap" x="745" y="170" width="70" height="60" rx="8" />
  <line class="wire thin" x1="760" y1="184" x2="760" y2="216" />
  <line class="wire thin" x1="772" y1="184" x2="772" y2="216" />
  <text class="small" x="781" y="204">Cc</text>
  <line class="wire" x1="745" y1="200" x2="662" y2="245" />
  <line class="wire" x1="815" y1="200" x2="913" y2="240" />
  <text class="small" x="705" y="156">Miller compensation capacitor</text>

  <text class="txt" x="768" y="344">Second gain stage</text>
  <text class="txt" x="600" y="594">Shared tail and stage currents sink to VSS</text>
</svg>
