<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>
      .bg { fill: #f8faf8; }
      .wire { stroke: #1f2937; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .sym { stroke: #111827; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .dot { fill: #111827; }
      .node { font: 700 20px "DejaVu Sans", sans-serif; fill: #111827; }
      .label { font: 600 18px "DejaVu Sans", sans-serif; fill: #111827; }
      .note { font: 500 16px "DejaVu Sans", sans-serif; fill: #374151; }
      .title { font: 700 30px "DejaVu Sans", sans-serif; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827" />
    </marker>

    <!-- Enhancement NMOS: broken channel, gate at left -->
    <g id="nmos_l">
      <line class="sym" x1="0" y1="-60" x2="0" y2="-18" />
      <line class="sym" x1="0" y1="18" x2="0" y2="60" />
      <line class="sym" x1="-34" y1="-30" x2="-34" y2="30" />
      <line class="sym" x1="-34" y1="0" x2="-8" y2="0" />
    </g>

    <!-- Enhancement PMOS: broken channel, gate at left + gate bubble -->
    <g id="pmos_l">
      <line class="sym" x1="0" y1="-60" x2="0" y2="-18" />
      <line class="sym" x1="0" y1="18" x2="0" y2="60" />
      <line class="sym" x1="-34" y1="-30" x2="-34" y2="30" />
      <line class="sym" x1="-34" y1="0" x2="-14" y2="0" />
      <circle class="sym" cx="-8" cy="0" r="6" />
    </g>

    <!-- PMOS variant with gate at right -->
    <g id="pmos_r">
      <line class="sym" x1="0" y1="-60" x2="0" y2="-18" />
      <line class="sym" x1="0" y1="18" x2="0" y2="60" />
      <line class="sym" x1="34" y1="-30" x2="34" y2="30" />
      <line class="sym" x1="34" y1="0" x2="14" y2="0" />
      <circle class="sym" cx="8" cy="0" r="6" />
    </g>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="860" />
  <text class="title" x="42" y="52">Two-Stage Miller OTA (PMOS Differential Pair, Standard Enhancement MOS Symbols)</text>

  <!-- Supply rails -->
  <line class="wire" x1="70" y1="80" x2="1330" y2="80" />
  <text class="node" x="76" y="68">VDD</text>

  <line class="wire" x1="70" y1="760" x2="1330" y2="760" />
  <text class="node" x="76" y="748">VSS / GND</text>

  <!-- Bias current source to PMOS pair -->
  <line class="wire" x1="390" y1="80" x2="390" y2="108" />
  <circle class="sym" cx="390" cy="138" r="26" />
  <line class="wire" x1="390" y1="122" x2="390" y2="154" marker-end="url(#arrow)" />
  <line class="wire" x1="390" y1="164" x2="390" y2="190" />
  <text class="label" x="330" y="145">IBIAS</text>

  <!-- PMOS differential pair M1, M2 -->
  <use href="#pmos_l" x="280" y="260" />
  <use href="#pmos_r" x="500" y="260" />
  <text class="label" x="258" y="338">M1</text>
  <text class="label" x="478" y="338">M2</text>

  <line class="wire" x1="280" y1="200" x2="280" y2="190" />
  <line class="wire" x1="500" y1="200" x2="500" y2="190" />
  <line class="wire" x1="280" y1="190" x2="500" y2="190" />
  <circle class="dot" cx="390" cy="190" r="5" />

  <line class="wire" x1="120" y1="260" x2="246" y2="260" />
  <circle class="dot" cx="120" cy="260" r="4" />
  <text class="node" x="62" y="266">VIN+</text>

  <line class="wire" x1="620" y1="260" x2="534" y2="260" />
  <circle class="dot" cx="620" cy="260" r="4" />
  <text class="node" x="628" y="266">VIN-</text>

  <!-- Drains of PMOS pair -->
  <line class="wire" x1="280" y1="320" x2="280" y2="430" />
  <line class="wire" x1="500" y1="320" x2="500" y2="430" />

  <!-- NMOS mirror load / first stage -->
  <use href="#nmos_l" x="280" y="490" />
  <use href="#nmos_l" x="500" y="490" />
  <text class="label" x="258" y="568">M3</text>
  <text class="label" x="478" y="568">M4</text>

  <!-- Diode connection and mirror gate tie -->
  <line class="wire" x1="246" y1="490" x2="280" y2="490" />
  <line class="wire" x1="280" y1="490" x2="280" y2="430" />
  <line class="wire" x1="246" y1="490" x2="466" y2="490" />
  <circle class="dot" cx="246" cy="490" r="5" />
  <circle class="dot" cx="466" cy="490" r="5" />

  <line class="wire" x1="280" y1="550" x2="280" y2="760" />
  <line class="wire" x1="500" y1="550" x2="500" y2="760" />

  <circle class="dot" cx="500" cy="430" r="5" />
  <text class="node" x="518" y="436">V1</text>
  <text class="note" x="216" y="604">PMOS input pair with NMOS current-mirror active load</text>

  <!-- Second stage: NMOS CS + PMOS current-source load -->
  <use href="#nmos_l" x="860" y="500" />
  <use href="#pmos_r" x="860" y="250" />
  <text class="label" x="838" y="578">M5</text>
  <text class="label" x="838" y="328">M6</text>

  <!-- M5 gate driven by V1 -->
  <line class="wire" x1="500" y1="430" x2="740" y2="430" />
  <line class="wire" x1="740" y1="430" x2="740" y2="500" />
  <line class="wire" x1="740" y1="500" x2="826" y2="500" />

  <!-- M5 drain / M6 drain output node -->
  <line class="wire" x1="860" y1="440" x2="860" y2="360" />
  <line class="wire" x1="860" y1="310" x2="860" y2="360" />
  <circle class="dot" cx="860" cy="360" r="5" />

  <line class="wire" x1="860" y1="190" x2="860" y2="80" />
  <line class="wire" x1="860" y1="560" x2="860" y2="760" />

  <!-- PMOS load gate bias -->
  <line class="wire" x1="894" y1="250" x2="1000" y2="250" />
  <circle class="dot" cx="1000" cy="250" r="4" />
  <text class="label" x="1010" y="256">VBP</text>

  <!-- VOUT label -->
  <line class="wire" x1="860" y1="360" x2="1120" y2="360" />
  <circle class="dot" cx="1120" cy="360" r="5" />
  <text class="node" x="1130" y="366">VOUT</text>

  <!-- Miller compensation capacitor Cc between V1 and VOUT -->
  <line class="wire" x1="660" y1="220" x2="660" y2="280" />
  <line class="wire" x1="678" y1="220" x2="678" y2="280" />
  <line class="wire" x1="500" y1="430" x2="660" y2="250" />
  <line class="wire" x1="678" y1="250" x2="860" y2="360" />
  <text class="label" x="640" y="208">Cc</text>
  <text class="note" x="560" y="186">Miller compensation capacitor (V1 to VOUT)</text>

  <!-- Footer notes -->
  <text class="note" x="70" y="814">Conventions used: enhancement MOS with broken channel; PMOS shown with gate bubble; orthogonal wiring with explicit junction dots.</text>
  <text class="note" x="70" y="836">Bulk terminals are omitted (common-well IC style) to keep the OTA topology readable.</text>
</svg>
